version: '3.8'

services:
  # StreamForge Broker 1
  broker-1:
    build:
      context: ..
      dockerfile: docker/broker.Dockerfile
    container_name: streamforge-broker-1
    environment:
      BROKER_ID: ${BROKER_1_ID:-1}
      LISTEN_ADDR: ${BROKER_LISTEN_ADDR:-0.0.0.0}
      PORT: ${BROKER_1_PORT:-9092}
      DATA_DIR: ${BROKER_DATA_DIR:-/data/streamforge}
      LOG_LEVEL: ${BROKER_LOG_LEVEL:-info}
      METRICS_PORT: ${BROKER_1_METRICS_PORT:-9101}
    ports:
      - "${BROKER_1_PORT:-9092}:9092"
      - "${BROKER_1_METRICS_PORT:-9101}:9101"
    volumes:
      - broker1_data:/data/streamforge
    networks:
      - streamforge-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 3

  # StreamForge Broker 2
  broker-2:
    build:
      context: ..
      dockerfile: docker/broker.Dockerfile
    container_name: streamforge-broker-2
    environment:
      BROKER_ID: ${BROKER_2_ID:-2}
      LISTEN_ADDR: ${BROKER_LISTEN_ADDR:-0.0.0.0}
      PORT: ${BROKER_2_PORT:-9092}
      DATA_DIR: ${BROKER_DATA_DIR:-/data/streamforge}
      LOG_LEVEL: ${BROKER_LOG_LEVEL:-info}
      METRICS_PORT: ${BROKER_2_METRICS_PORT:-9102}
    ports:
      - "${BROKER_2_PORT:-9093}:9092"
      - "${BROKER_2_METRICS_PORT:-9102}:9101"
    volumes:
      - broker2_data:/data/streamforge
    networks:
      - streamforge-net
    depends_on:
      - broker-1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 3

  # StreamForge Broker 3
  broker-3:
    build:
      context: ..
      dockerfile: docker/broker.Dockerfile
    container_name: streamforge-broker-3
    environment:
      BROKER_ID: ${BROKER_3_ID:-3}
      LISTEN_ADDR: ${BROKER_LISTEN_ADDR:-0.0.0.0}
      PORT: ${BROKER_3_PORT:-9092}
      DATA_DIR: ${BROKER_DATA_DIR:-/data/streamforge}
      LOG_LEVEL: ${BROKER_LOG_LEVEL:-info}
      METRICS_PORT: ${BROKER_3_METRICS_PORT:-9103}
    ports:
      - "${BROKER_3_PORT:-9094}:9092"
      - "${BROKER_3_METRICS_PORT:-9103}:9101"
    volumes:
      - broker3_data:/data/streamforge
    networks:
      - streamforge-net
    depends_on:
      - broker-1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Admin CLI and REST API
  admin:
    build:
      context: ..
      dockerfile: docker/admin.Dockerfile
    container_name: streamforge-admin
    environment:
      BROKERS: broker-1:9092,broker-2:9092,broker-3:9092
      ADMIN_PORT: ${ADMIN_PORT:-8080}
      LOG_LEVEL: ${ADMIN_LOG_LEVEL:-info}
    ports:
      - "${ADMIN_PORT:-8080}:8080"
    networks:
      - streamforge-net
    depends_on:
      - broker-1
      - broker-2
      - broker-3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: streamforge-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - streamforge-net
    depends_on:
      - broker-1
      - broker-2
      - broker-3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: streamforge-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - streamforge-net
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  streamforge-net:
    driver: ${NETWORK_DRIVER:-bridge}

volumes:
  broker1_data:
    driver: local
  broker2_data:
    driver: local
  broker3_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
